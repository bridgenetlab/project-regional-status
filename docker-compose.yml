version: "3.8"

services:
  project-tracking-regional:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-tracking-regional:latest
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - NODE_ENV=production
    volumes:
      - ./dashboard:/usr/share/nginx/html
